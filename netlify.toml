[build]
  # Set the base directory to the frontend app
  base = "apps/frontend"
  # This command runs from the base directory
  command = "npm install && npm run build"
  # The directory to publish, relative to the base directory
  publish = "dist"

# Configure redirects for Client-Side Routing (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Add common security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
